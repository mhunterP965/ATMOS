node_title: ATMOS Operational Architecture Context
top_level_function: Conduct Air-Focused Weather Exploitation Operations

purpose: >
  Enable distributed platforms to observe atmospheric conditions,
  estimate local micro-weather state, federate and share results,
  and support aviation safety, survivability, and mission effectiveness.

viewpoint: >
  Operational architecture described using DoDAF OV-1 through OV-5b.

boundary:
  inside:
    - Observation ingestion
    - Local weather estimation
    - Uncertainty quantification
    - Federation / COWP formation
    - Dissemination of weather context
  outside:
    - Route selection
    - Maneuver decisions
    - Command authority
    - Mission execution decisions

