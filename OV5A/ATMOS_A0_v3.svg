<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="1400" viewBox="0 0 3000 1400">
  <!-- ATMOS A0 Decomposition Diagram - v3. Strict B/W IDEF0 with parent/child boundary concordance. -->
  <!-- Source model unchanged: ATMOS_A0.yaml. Internal flows limited to F1-F5. No inferred arrows. -->
  <!-- A1-A4 main row; A5/A6 stacked pair right of A4. All A-0 boundary ICOMs originate at the frame. -->

  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="10" refX="12" refY="5"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L12,5 L0,10 Z" fill="black"/>
    </marker>
  </defs>

  <style>
    text { font-family: Helvetica, Arial, sans-serif; fill: black; }
    .albl { font-size: 12px; }
    .bname { font-size: 13px; }
    .bnum { font-size: 13px; font-weight: bold; }
    .id { font-weight: bold; }
    .conn { stroke: black; stroke-width: 1.5; fill: none; }
    .frame { stroke: black; stroke-width: 1.2; fill: none; }
  </style>

  <rect x="0" y="0" width="3000" height="1400" fill="white"/>

  <!-- Title / node / classification -->
  <text x="1420" y="40" text-anchor="middle" font-size="20" font-weight="bold">A0 — Decompose Conduct Air-Focused Weather Exploitation Operations</text>
  <text x="2980" y="28" text-anchor="end" font-size="12">Distribution Statement C</text>
  <text x="2980" y="1385" text-anchor="end" font-size="13" font-weight="bold">Node: A0</text>

  <!-- =========================== A0 DIAGRAM BOUNDARY FRAME =========================== -->
  <rect class="frame" x="140" y="140" width="2560" height="1160"/>

  <!-- =========================== FUNCTION BOXES =========================== -->
  <!-- A1 -->
  <rect x="440" y="640" width="220" height="140" fill="white" stroke="black" stroke-width="2.5"/>
  <text class="bname" x="550" text-anchor="middle">
    <tspan x="550" y="702">Acquire Micro-Weather</tspan>
    <tspan x="550" y="720">Observations</tspan>
  </text>
  <text class="bnum" x="650" y="772" text-anchor="end">1</text>

  <!-- A2 -->
  <rect x="760" y="640" width="220" height="140" fill="white" stroke="black" stroke-width="2.5"/>
  <text class="bname" x="870" text-anchor="middle">
    <tspan x="870" y="702">Generate Local</tspan>
    <tspan x="870" y="720">Weather State</tspan>
  </text>
  <text class="bnum" x="970" y="772" text-anchor="end">2</text>

  <!-- A3 -->
  <rect x="1080" y="640" width="220" height="140" fill="white" stroke="black" stroke-width="2.5"/>
  <text class="bname" x="1190" y="716" text-anchor="middle">Quantify Uncertainty</text>
  <text class="bnum" x="1290" y="772" text-anchor="end">3</text>

  <!-- A4 -->
  <rect x="1400" y="640" width="220" height="140" fill="white" stroke="black" stroke-width="2.5"/>
  <text class="bname" x="1510" text-anchor="middle">
    <tspan x="1510" y="692">Federate and Maintain</tspan>
    <tspan x="1510" y="710">Federated Weather</tspan>
    <tspan x="1510" y="728">Context</tspan>
  </text>
  <text class="bnum" x="1610" y="772" text-anchor="end">4</text>

  <!-- A5 (top of stacked pair) -->
  <rect x="2080" y="440" width="220" height="140" fill="white" stroke="black" stroke-width="2.5"/>
  <text class="bname" x="2190" text-anchor="middle">
    <tspan x="2190" y="492">Detect Threshold</tspan>
    <tspan x="2190" y="510">Crossings (Descriptive</tspan>
    <tspan x="2190" y="528">Support)</tspan>
  </text>
  <text class="bnum" x="2290" y="572" text-anchor="end">5</text>

  <!-- A6 (bottom of stacked pair) -->
  <rect x="2080" y="860" width="220" height="140" fill="white" stroke="black" stroke-width="2.5"/>
  <text class="bname" x="2190" text-anchor="middle">
    <tspan x="2190" y="912">Produce Mission-</tspan>
    <tspan x="2190" y="930">Tailored Weather</tspan>
    <tspan x="2190" y="948">Context</tspan>
  </text>
  <text class="bnum" x="2290" y="992" text-anchor="end">6</text>

  <!-- =========================== INTERNAL FLOWS F1-F5 =========================== -->
  <path class="conn" d="M660,710 H760" marker-end="url(#arrow)"/>
  <path class="conn" d="M980,710 H1080" marker-end="url(#arrow)"/>
  <path class="conn" d="M1300,710 H1400" marker-end="url(#arrow)"/>
  <!-- F4: A4 -> A5 left -->
  <path class="conn" d="M1620,680 H1760 V510 H2080" marker-end="url(#arrow)"/>
  <!-- F5: A4 -> A6 left -->
  <path class="conn" d="M1620,720 H1820 V940 H2080" marker-end="url(#arrow)"/>

  <text class="albl" x="550" y="600" text-anchor="middle"><tspan class="id">F1</tspan> Time/Geo-Tagged, Quality-Checked Observations (IER-03)</text>
  <text class="albl" x="870" y="600" text-anchor="middle"><tspan class="id">F2</tspan> Local Micro-Weather State Estimate (IER-05)</text>
  <text class="albl" x="1190" y="600" text-anchor="middle"><tspan class="id">F3</tspan> Confidence Bounds &amp; Risk Envelopes (IER-09)</text>
  <text class="albl" x="1720" y="356"><tspan class="id">F4</tspan> Federated Weather</text>
  <text class="albl" x="1720" y="371">Context / COWP State</text>
  <text class="albl" x="1640" y="786"><tspan class="id">F5</tspan> Federated Weather</text>
  <text class="albl" x="1640" y="801">Context / COWP State</text>

  <!-- =========================== BOUNDARY INPUTS (from LEFT frame) =========================== -->
  <path class="conn" d="M140,660 H440" marker-end="url(#arrow)"/>
  <path class="conn" d="M140,720 H440" marker-end="url(#arrow)"/>
  <!-- I3 from left frame -> forks to A5 and A6 left -->
  <path class="conn" d="M140,280 H1960"/>
  <path class="conn" d="M1900,280 V490 H2080" marker-end="url(#arrow)"/>
  <path class="conn" d="M1960,280 V900 H2080" marker-end="url(#arrow)"/>

  <text class="albl" x="150" y="648"><tspan class="id">I1</tspan> Collocated Atmospheric Observations</text>
  <text class="albl" x="150" y="742"><tspan class="id">I2</tspan> Peer Platform Weather Observations</text>
  <text class="albl" x="150" y="268"><tspan class="id">I3</tspan> Mission Weather Threshold Definitions</text>

  <!-- =========================== BOUNDARY CONTROLS (from TOP frame) =========================== -->
  <!-- C3 -> A4 -->
  <path class="conn" d="M1470,140 V640" marker-end="url(#arrow)"/>
  <!-- C2 -> A4 and A6 -->
  <path class="conn" d="M1410,140 H2480"/>
  <path class="conn" d="M1410,140 V640" marker-end="url(#arrow)"/>
  <path class="conn" d="M2480,140 V820 H2240 V860" marker-end="url(#arrow)"/>
  <!-- C1 -> A5 and A6 -->
  <path class="conn" d="M2190,140 H2520"/>
  <path class="conn" d="M2190,140 V440" marker-end="url(#arrow)"/>
  <path class="conn" d="M2520,140 V820 H2260 V860" marker-end="url(#arrow)"/>

  <text class="albl" x="1470" y="118" text-anchor="middle"><tspan class="id">C3</tspan> Network availability and DDS QoS policies</text>
  <text class="albl" x="1410" y="100" text-anchor="middle"><tspan class="id">C2</tspan> OPSEC / classification guidance</text>
  <text class="albl" x="2190" y="118" text-anchor="middle"><tspan class="id">C1</tspan> Mission objectives and operational constraints</text>

  <!-- =========================== BOUNDARY OUTPUTS (to RIGHT frame) =========================== -->
  <!-- O1 from A4 (high lane) -->
  <path class="conn" d="M1620,660 H1700 V340 H2700" marker-end="url(#arrow)"/>
  <!-- O3 from A5 -->
  <path class="conn" d="M2300,490 H2700" marker-end="url(#arrow)"/>
  <!-- O2 from A6 -->
  <path class="conn" d="M2300,900 H2700" marker-end="url(#arrow)"/>

  <text class="albl" x="2710" y="334"><tspan class="id">O1</tspan> Fused COWP State</text>
  <text class="albl" x="2710" y="484"><tspan class="id">O3</tspan> Weather State Change Notifications</text>
  <text class="albl" x="2710" y="894"><tspan class="id">O2</tspan> Mission-Tailored COWP Excerpts</text>

  <!-- =========================== BOUNDARY MECHANISMS (from BOTTOM frame) =========================== -->
  <!-- M1 -> A1,A2,A3,A4,A5,A6 (stub from bottom frame to trunk, then fork up) -->
  <path class="conn" d="M600,1300 V1160"/>
  <path class="conn" d="M500,1160 H2120"/>
  <path class="conn" d="M500,1160 V780" marker-end="url(#arrow)"/>
  <path class="conn" d="M820,1160 V780" marker-end="url(#arrow)"/>
  <path class="conn" d="M1140,1160 V780" marker-end="url(#arrow)"/>
  <path class="conn" d="M1460,1160 V780" marker-end="url(#arrow)"/>
  <path class="conn" d="M2120,1160 V1000" marker-end="url(#arrow)"/>
  <path class="conn" d="M2020,1160 V760 H2190 V580" marker-end="url(#arrow)"/>
  <!-- M2 -> A2,A3 -->
  <path class="conn" d="M1040,1300 V1100"/>
  <path class="conn" d="M880,1100 H1180"/>
  <path class="conn" d="M880,1100 V780" marker-end="url(#arrow)"/>
  <path class="conn" d="M1180,1100 V780" marker-end="url(#arrow)"/>
  <!-- M3 -> A4,A6 -->
  <path class="conn" d="M1720,1300 V1040"/>
  <path class="conn" d="M1540,1040 H2160"/>
  <path class="conn" d="M1540,1040 V780" marker-end="url(#arrow)"/>
  <path class="conn" d="M2160,1040 V1000" marker-end="url(#arrow)"/>

  <text class="albl" x="650" y="1330" text-anchor="middle"><tspan class="id">M1</tspan> Platforms hosting ATMOS node compute</text>
  <text class="albl" x="1040" y="1330" text-anchor="middle"><tspan class="id">M2</tspan> ABLE-LBM / reduced models</text>
  <text class="albl" x="1720" y="1330" text-anchor="middle"><tspan class="id">M3</tspan> DDS middleware and communications links</text>

</svg>
