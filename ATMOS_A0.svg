<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="1200" viewBox="0 0 2100 1200">
  <!-- ATMOS A0 Decomposition Diagram. Strict black-and-white IDEF0 style. -->
  <!-- Source: ATMOS_A0.yaml. Internal flows limited to F1-F5. No inferred arrows. -->
  <!-- A1-A4 main row; A5/A6 stacked pair right of A4 (per layout guidance). -->

  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="10" refX="12" refY="5"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L12,5 L0,10 Z" fill="black"/>
    </marker>
  </defs>

  <style>
    text { font-family: Helvetica, Arial, sans-serif; fill: black; }
    .albl { font-size: 12px; }
    .bname { font-size: 13px; }
    .bnum { font-size: 13px; font-weight: bold; }
    .id { font-weight: bold; }
    .conn { stroke: black; stroke-width: 1.5; fill: none; }
  </style>

  <!-- White background -->
  <rect x="0" y="0" width="2100" height="1200" fill="white"/>

  <!-- Title / node / classification -->
  <text x="1050" y="40" text-anchor="middle" font-size="20" font-weight="bold">A0 — Decompose Conduct Air-Focused Weather Exploitation Operations</text>
  <text x="2060" y="30" text-anchor="end" font-size="12">Distribution Statement C</text>
  <text x="2060" y="1180" text-anchor="end" font-size="13" font-weight="bold">Node: A0</text>

  <!-- =========================== FUNCTION BOXES =========================== -->
  <!-- A1 -->
  <rect x="380" y="520" width="200" height="120" fill="white" stroke="black" stroke-width="2.5"/>
  <text class="bname" x="480" text-anchor="middle">
    <tspan x="480" y="562">Acquire</tspan>
    <tspan x="480" y="578">Micro-Weather</tspan>
    <tspan x="480" y="594">Observations</tspan>
  </text>
  <text class="bnum" x="570" y="632" text-anchor="end">1</text>

  <!-- A2 -->
  <rect x="680" y="520" width="200" height="120" fill="white" stroke="black" stroke-width="2.5"/>
  <text class="bname" x="780" text-anchor="middle">
    <tspan x="780" y="570">Generate Local</tspan>
    <tspan x="780" y="586">Weather State</tspan>
  </text>
  <text class="bnum" x="870" y="632" text-anchor="end">2</text>

  <!-- A3 -->
  <rect x="980" y="520" width="200" height="120" fill="white" stroke="black" stroke-width="2.5"/>
  <text class="bname" x="1080" text-anchor="middle">
    <tspan x="1080" y="570">Quantify</tspan>
    <tspan x="1080" y="586">Uncertainty</tspan>
  </text>
  <text class="bnum" x="1170" y="632" text-anchor="end">3</text>

  <!-- A4 -->
  <rect x="1280" y="520" width="200" height="120" fill="white" stroke="black" stroke-width="2.5"/>
  <text class="bname" x="1380" text-anchor="middle">
    <tspan x="1380" y="558">Federate and Maintain</tspan>
    <tspan x="1380" y="574">Federated Weather</tspan>
    <tspan x="1380" y="590">Context</tspan>
  </text>
  <text class="bnum" x="1470" y="632" text-anchor="end">4</text>

  <!-- A5 (top of stacked pair) -->
  <rect x="1680" y="320" width="200" height="120" fill="white" stroke="black" stroke-width="2.5"/>
  <text class="bname" x="1780" text-anchor="middle">
    <tspan x="1780" y="362">Detect Threshold</tspan>
    <tspan x="1780" y="378">Crossings</tspan>
    <tspan x="1780" y="394">(Descriptive Support)</tspan>
  </text>
  <text class="bnum" x="1870" y="432" text-anchor="end">5</text>

  <!-- A6 (bottom of stacked pair) -->
  <rect x="1680" y="720" width="200" height="120" fill="white" stroke="black" stroke-width="2.5"/>
  <text class="bname" x="1780" text-anchor="middle">
    <tspan x="1780" y="762">Produce Mission-</tspan>
    <tspan x="1780" y="778">Tailored Weather</tspan>
    <tspan x="1780" y="794">Context</tspan>
  </text>
  <text class="bnum" x="1870" y="832" text-anchor="end">6</text>

  <!-- =========================== INTERNAL FLOWS F1-F5 =========================== -->
  <path class="conn" d="M580,580 H680" marker-end="url(#arrow)"/>
  <path class="conn" d="M880,580 H980" marker-end="url(#arrow)"/>
  <path class="conn" d="M1180,580 H1280" marker-end="url(#arrow)"/>
  <!-- F4: A4 -> A5 left -->
  <path class="conn" d="M1480,560 H1560 V380 H1680" marker-end="url(#arrow)"/>
  <!-- F5: A4 -> A6 left -->
  <path class="conn" d="M1480,600 H1580 V780 H1680" marker-end="url(#arrow)"/>

  <text class="albl" x="630" y="500" text-anchor="middle"><tspan class="id">F1</tspan> Time/Geo-Tagged, Quality-Checked Observations (IER-03)</text>
  <text class="albl" x="930" y="478" text-anchor="middle"><tspan class="id">F2</tspan> Local Micro-Weather State Estimate (IER-05)</text>
  <text class="albl" x="1230" y="500" text-anchor="middle"><tspan class="id">F3</tspan> Confidence Bounds &amp; Risk Envelopes (IER-09)</text>
  <text class="albl" x="1496" y="470"><tspan class="id">F4</tspan> Federated Weather Context / COWP State</text>
  <text class="albl" x="1496" y="700"><tspan class="id">F5</tspan> Federated Weather Context / COWP State</text>

  <!-- =========================== BOUNDARY INPUTS (left) =========================== -->
  <path class="conn" d="M40,560 H380" marker-end="url(#arrow)"/>
  <path class="conn" d="M40,610 H380" marker-end="url(#arrow)"/>
  <!-- I3 -> A5 and A6 (boundary input bus) -->
  <path class="conn" d="M40,200 H1630"/>
  <path class="conn" d="M1630,200 V760"/>
  <path class="conn" d="M1630,400 H1680" marker-end="url(#arrow)"/>
  <path class="conn" d="M1630,760 H1680" marker-end="url(#arrow)"/>

  <text class="albl" x="48" y="548"><tspan class="id">I1</tspan> Collocated Atmospheric Observations</text>
  <text class="albl" x="48" y="628"><tspan class="id">I2</tspan> Peer Platform Weather Observations</text>
  <text class="albl" x="60" y="190"><tspan class="id">I3</tspan> Mission Weather Threshold Definitions</text>

  <!-- =========================== BOUNDARY CONTROLS (top) =========================== -->
  <!-- C3 -> A4 -->
  <path class="conn" d="M1380,140 V520" marker-end="url(#arrow)"/>
  <!-- C2 -> A4 and A6 -->
  <path class="conn" d="M1330,140 H1950"/>
  <path class="conn" d="M1330,140 V520" marker-end="url(#arrow)"/>
  <path class="conn" d="M1950,140 V680 H1820 V720" marker-end="url(#arrow)"/>
  <!-- C1 -> A5 and A6 -->
  <path class="conn" d="M1780,160 H1980"/>
  <path class="conn" d="M1780,160 V320" marker-end="url(#arrow)"/>
  <path class="conn" d="M1980,160 V700 H1800 V720" marker-end="url(#arrow)"/>

  <text class="albl" x="1200" y="118"><tspan class="id">C3</tspan> Network availability and DDS QoS policies</text>
  <text class="albl" x="1620" y="100"><tspan class="id">C2</tspan> OPSEC / classification guidance</text>
  <text class="albl" x="1700" y="84"><tspan class="id">C1</tspan> Mission objectives and operational constraints</text>

  <!-- =========================== BOUNDARY OUTPUTS (right) =========================== -->
  <!-- O1 from A4 (up and over the stack to right boundary) -->
  <path class="conn" d="M1480,540 H1540 V240 H2020" marker-end="url(#arrow)"/>
  <!-- O3 from A5 -->
  <path class="conn" d="M1880,380 H2020" marker-end="url(#arrow)"/>
  <!-- O2 from A6 -->
  <path class="conn" d="M1880,780 H2020" marker-end="url(#arrow)"/>

  <text class="albl" x="1760" y="230" text-anchor="middle"><tspan class="id">O1</tspan> Fused COWP State</text>
  <text class="albl" x="1895" y="368"><tspan class="id">O3</tspan> Weather State Change Notifications</text>
  <text class="albl" x="1895" y="768"><tspan class="id">O2</tspan> Mission-Tailored COWP Excerpts</text>

  <!-- =========================== BOUNDARY MECHANISMS (bottom) =========================== -->
  <!-- M1 -> A1,A2,A3,A4,A5,A6 -->
  <path class="conn" d="M440,1040 H1960"/>
  <path class="conn" d="M440,1040 V640" marker-end="url(#arrow)"/>
  <path class="conn" d="M740,1040 V640" marker-end="url(#arrow)"/>
  <path class="conn" d="M1040,1040 V640" marker-end="url(#arrow)"/>
  <path class="conn" d="M1340,1040 V640" marker-end="url(#arrow)"/>
  <path class="conn" d="M1780,1040 V840" marker-end="url(#arrow)"/>
  <path class="conn" d="M1960,1040 V560 H1740 V440" marker-end="url(#arrow)"/>
  <!-- M2 -> A2,A3 -->
  <path class="conn" d="M820,1000 H1120"/>
  <path class="conn" d="M820,1000 V640" marker-end="url(#arrow)"/>
  <path class="conn" d="M1120,1000 V640" marker-end="url(#arrow)"/>
  <!-- M3 -> A4,A6 -->
  <path class="conn" d="M1420,980 H1840"/>
  <path class="conn" d="M1420,980 V640" marker-end="url(#arrow)"/>
  <path class="conn" d="M1840,980 V840" marker-end="url(#arrow)"/>

  <text class="albl" x="520" y="1062"><tspan class="id">M1</tspan> Platforms hosting ATMOS node compute</text>
  <text class="albl" x="840" y="1020"><tspan class="id">M2</tspan> ABLE-LBM / reduced models</text>
  <text class="albl" x="1440" y="1000"><tspan class="id">M3</tspan> DDS middleware and communications links</text>

</svg>
